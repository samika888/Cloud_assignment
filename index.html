<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samika Khadka</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #eff1e5;
            color: #91a0b3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #f3f7d3;
            border-radius: 20px;
            padding: 48px;
            max-width: 580px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,.5);
            text-align: center;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8a8cec, #f377b5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }
        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #8a8cec, #f377b5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #1a1c48;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }
        .info-item {
            background: #ffffff;
            border-radius: 12px;
            padding: 16px;
            text-align: left;
        }
        .info-item .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #222339;
            font-weight: 600;
        }
        .info-item .value {
            font-size: 15px;
            font-weight: 600;
            margin-top: 4px;
        }
        .full {
            grid-column: 1 / -1;
        }
        .commit-hash {
            font-family: monospace;
            color: #f59e0b;
            word-break: break-all;
        }
        .footer {
            padding-top: 20px;
            border-top: 1px solid #444244;
            font-size: 12px;
            color: #444244;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">OPERATIONAL</span>
        <h1>Samika Khadka</h1>
        <p class="subtitle">BESE2023 | Roll No. 33 | Port 8033</p>
        <p class="subtitle">Automated CI/CD Deployment Pipeline</p>
        <div class="info-grid">
            <div class="info-item"><div class="label">Status</div><div class="value" style="color:#22c55e;">Operational</div></div>
            <div class="info-item"><div class="label">Version</div><div class="value">v1.0.0</div></div>
            <div class="info-item" style="grid-column: 1 / -1;"><div class="label">Commit</div><div class="value commit-hash">__COMMIT_HASH__</div></div>
            <div class="info-item" style="grid-column: 1 / -1;"><div class="label">Deployed At</div><div class="value">__DEPLOY_TIME__</div></div>
        </div>

        <div class="footer">
            Powered by GitHub Actions
        </div>
    </div>
</body>
</html>
