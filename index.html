<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samika Khadka</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #fdf6f0;
  }

  .bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .ombre {
    position: absolute;
    top: 0; right: 0;
    width: 45%;
    height: 100%;
    background: linear-gradient(160deg, #f9c8d8 0%, #e8b8d8 40%, #c8a8e8 80%, #b8c8f0 100%);
    opacity: 0.45;
    border-radius: 60% 0 0 60%;
  }

  .blob { position: absolute; border-radius: 50%; filter: blur(55px); opacity: 0.3; animation: float 8s ease-in-out infinite; }
  .blob1 { width: 380px; height: 380px; background: #f5c6d0; top: -80px; left: -80px; animation-delay: 0s; }
  .blob2 { width: 220px; height: 220px; background: #f9e0bb; top: 20%; left: 35%; animation-delay: 1.5s; }
  .blob3 { width: 200px; height: 200px; background: #b8d8e8; bottom: -60px; left: 20%; animation-delay: 3s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-18px) scale(1.04); }
  }

  canvas {
    position: absolute;
    top: 0; right: 0;
    width: 45%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .card {
    position: relative;
    z-index: 2;
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(22px);
    border: 1px solid rgba(255,255,255,0.85);
    border-radius: 32px;
    padding: 52px 48px;
    max-width: 520px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(180,130,160,0.15);
  }

  .avatar {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f5c6d0, #c8b8e8);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    margin: 0 auto 24px;
    box-shadow: 0 4px 24px rgba(200,140,180,0.35);
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 24px rgba(200,140,180,0.35); }
    50% { box-shadow: 0 4px 36px rgba(200,140,180,0.6); }
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: #5a3e5a;
    margin-bottom: 8px;
    animation: fadeUp 0.8s ease forwards;
  }

  .tagline {
    font-size: 0.85rem;
    color: #a08898;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 36px;
    animation: fadeUp 0.9s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 36px;
  }

  .pill {
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(200,155,190,0.3);
    border-radius: 999px;
    padding: 8px 20px;
    font-size: 0.82rem;
    color: #7a5570;
    font-weight: 400;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
  }

  .pill:hover { background: rgba(255,255,255,0.9); }

  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(200,155,190,0.3), transparent);
    margin: 0 0 28px;
  }

  .footer {
    font-size: 0.75rem;
    color: #b8a0b0;
    letter-spacing: 0.08em;
  }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #b8d8b8;
    margin-right: 6px;
    vertical-align: middle;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="bg">
    <div class="ombre"></div>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
  </div>

  <canvas id="rain"></canvas>

  <div class="card">
    <div class="avatar">🌸</div>
    <div class="name">Samika Khadka</div>
    <div class="tagline">BE Software Engineering &nbsp;·&nbsp; Roll No. 33</div>

      <span class="pill">
